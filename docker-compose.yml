services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zunion
      POSTGRES_USER: zunion
      POSTGRES_PASSWORD: zunion
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zunion -d zunion"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://zunion:zunion@db:5432/zunion
      APP_ORIGIN: http://localhost:8080
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node dist/migrate.js && node dist/server.js"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  uploads:
